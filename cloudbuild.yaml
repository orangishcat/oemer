steps:
  - name: 'alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
      - apk add --no-cache tree
      - tree -L 3 .
  # Install Cog, log in, and push using a Docker-enabled image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y curl
        curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/download/v0.14.1/cog_Linux_x86_64
        chmod +x /usr/local/bin/cog
        echo '194756ce-bd21-4640-88f4-fb0aa485b8a1' | /usr/local/bin/cog login --token-stdin
        /usr/local/bin/cog push r8.im/orangishcat/oemer
